<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Laporan Harian - Proyek Fransiscus Xaverius College</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --border-color: #1a1a1a;
            --bg-white: #ffffff;
            --bg-light: #fafafa;
            --text-dark: #1a1a1a;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --font-main: 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: #e8ecf1;
            background-image: radial-gradient(ellipse at 20% 20%, #d5dce4 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, #c8d0d9 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px 5px 40px;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        @media print {
            body { background: #ffffff; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .document-container {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                max-width: 100% !important;
                width: 100% !important;
                padding: 6mm !important;
            }
            @page { size: A4 landscape; margin: 4mm; }
            input, textarea, select {
                border: none !important; background: transparent !important;
                box-shadow: none !important; padding: 2px 4px !important;
                font-size: 10px !important; color: #000 !important;
                resize: none !important; overflow: hidden !important;
            }
            input[type="checkbox"] {
                -webkit-appearance: checkbox !important; appearance: checkbox !important;
                width: 14px !important; height: 14px !important; border: 1px solid #000 !important;
            }
            input[type="time"] { -webkit-appearance: none; appearance: none; font-size: 9px !important; padding: 1px 2px !important; }
            table { page-break-inside: avoid; }
            .btn-remove-weather, .btn-add-weather { display: none !important; }
            .weather-entry { border: none !important; background: transparent !important; }
            .table-wrapper { overflow-x: visible !important; }
            .main-data-table { width: 100% !important; min-width: 0 !important; }
            .main-data-table th, .main-data-table td { padding: 2px 3px !important; font-size: 9px !important; }
            .main-data-table th { font-size: 10px !important; font-weight: 700 !important; }
        }

        .document-container {
            width: 100%;
            max-width: 1300px;
            background: #ffffff;
            border: 1px solid #d0d5db;
            border-radius: 4px;
            box-shadow: var(--shadow-md);
            padding: 20px 16px 20px;
            margin: 0 auto;
            position: relative;
        }

        .main-title {
            text-align: center;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
            color: #1a1a1a;
        }

        .date-header-display {
            text-align: center;
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 14px;
        }

        .work-type-section {
            border: 2px solid #2c2c2c;
            padding: 8px 12px;
            margin-bottom: 14px;
            text-align: center;
            font-weight: 700;
            font-size: clamp(12px, 2.5vw, 16px);
            letter-spacing: 0.5px;
            background: #fafbfb;
            text-transform: uppercase;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 12px;
        }

        .main-data-table {
            width: 100%;
            min-width: 1000px;
            border-collapse: collapse;
            font-size: 10px;
            table-layout: auto;
            border: 3px solid #000;
        }

        .main-data-table th,
        .main-data-table td {
            border: 1.5px solid #2c2c2c;
            padding: 4px 3px;
            text-align: center;
            vertical-align: top;
            font-size: 10px;
            word-break: break-word;
        }

        .main-data-table th {
            background: #f7f8f9;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            color: #2c2c2c;
            padding: 7px 5px;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 2;
            border-bottom: 2px solid #000;
        }

        .main-data-table .sub-header {
            background: #fafbfb;
            font-size: 10px;
            font-weight: 600;
        }

        .main-data-table .col-tenaga { min-width: 70px; }
        .main-data-table .col-alat { min-width: 70px; }
        .main-data-table .col-jam { min-width: 100px; }
        .main-data-table .col-ket { min-width: 80px; }
        .main-data-table .col-mat-datang { min-width: 120px; }
        .main-data-table .col-mat-tolak { min-width: 45px; }
        .main-data-table .col-mat-terima { min-width: 45px; }
        .main-data-table .col-hari-ini { min-width: 170px; }
        .main-data-table .col-besok { min-width: 170px; }

        .main-data-table tbody tr:hover { background: #fdfde8; }

        .main-data-table textarea {
            width: 100%;
            border: none;
            background: transparent;
            text-align: left;
            font-size: 10px;
            font-family: var(--font-main);
            padding: 2px 2px;
            resize: none;
            overflow: hidden;
            min-height: 28px;
            line-height: 1.4;
            color: #1a1a1a;
            border-radius: 2px;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .main-data-table textarea:focus {
            outline: 2px solid #4a90d9;
            outline-offset: -1px;
            background: #fefefe;
            box-shadow: 0 0 0 3px rgba(74,144,217,0.08);
        }

        .main-data-table input[type="time"] {
            border: 1px solid #ddd;
            background: #fff;
            text-align: center;
            font-size: 10px;
            font-family: var(--font-main);
            padding: 3px 2px;
            border-radius: 3px;
            width: 100%;
            color: #1a1a1a;
            transition: all 0.2s ease;
            min-width: 40px;
        }

        .main-data-table input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2c7be5;
            margin: 0 auto;
            display: block;
        }

        .jam-range-wrapper {
            display: flex;
            align-items: center;
            gap: 2px;
            justify-content: center;
            flex-wrap: nowrap;
        }

        .jam-range-wrapper span { font-size: 9px; font-weight: 600; color: #555; flex-shrink: 0; }
        .jam-range-wrapper input[type="time"] { flex: 1; min-width: 0; }

        .total-row-bar {
            border: 2px solid #2c2c2c;
            border-top: 3px solid #000;
            padding: 8px 12px;
            margin-bottom: 12px;
            background: #f0f2f5;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .total-row-bar .total-label { font-weight: 700; letter-spacing: 0.5px; }
        .total-row-bar .total-detail { font-weight: 400; font-size: 11px; color: #444; }
        .total-row-bar .total-detail strong { font-size: 13px; color: #1a1a1a; }

        .bottom-info-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            align-items: stretch;
        }

        .weather-box {
            flex: 1 1 400px;
            border: 2px solid #2c2c2c;
            padding: 10px 12px;
            background: #fafbfb;
            min-width: 280px;
        }

        .weather-box .weather-title {
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #2c2c2c;
            border-bottom: 2px solid #000;
            padding-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .weather-entries-container { display: flex; flex-direction: column; gap: 5px; }

        .weather-entry {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 5px 8px;
            background: #fff;
            border: 1px solid #e0e3e8;
            border-radius: 4px;
            font-size: 10.5px;
        }

        .weather-entry select {
            padding: 4px 6px;
            border-radius: 4px;
            border: 1.5px solid #d0d5db;
            font-size: 10.5px;
            font-family: var(--font-main);
            background: #fff;
            min-width: 80px;
        }

        .weather-entry input[type="time"] {
            border: 1.5px solid #d0d5db;
            padding: 4px 5px;
            border-radius: 4px;
            font-size: 10px;
            font-family: var(--font-main);
            width: 75px;
            background: #fff;
        }

        .weather-entry .time-sep { color: #777; font-weight: 600; font-size: 10px; }

        .btn-remove-weather {
            width: 24px; height: 24px; border-radius: 50%;
            border: 1.5px solid #e74c3c; background: #fff; color: #e74c3c;
            cursor: pointer; font-size: 14px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s; flex-shrink: 0; line-height: 1; padding: 0;
        }

        .btn-remove-weather:hover { background: #e74c3c; color: #fff; transform: scale(1.1); }

        .btn-add-weather {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 12px; border-radius: 20px;
            border: 2px dashed #2c7be5; background: #f8fafd; color: #2c7be5;
            cursor: pointer; font-size: 10.5px; font-weight: 600;
            margin-top: 4px; font-family: var(--font-main); transition: 0.2s;
        }

        .btn-add-weather:hover { background: #eaf2fb; border-style: solid; }

        .date-box {
            flex: 1 1 240px;
            border: 2px solid #2c2c2c;
            padding: 10px 12px;
            background: #fafbfb;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
            font-size: 11px;
        }

        .date-box .info-row { display: flex; flex-direction: column; gap: 2px; }
        .date-box .info-row-inline { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .date-box .info-label { font-weight: 600; white-space: nowrap; font-size: 10.5px; color: #333; }
        .date-box input[type="date"], .date-box input[type="time"], .date-box input[type="number"] {
            border: 1.5px solid #ccc; padding: 4px 6px; border-radius: 4px;
            font-size: 10.5px; font-family: var(--font-main); background: #fff;
            transition: 0.2s; color: #1a1a1a;
        }
        .date-box input[type="date"] { width: 100%; }
        .date-box input[type="time"] { width: 100%; }
        .date-box input[type="number"] { width: 100%; text-align: left; }

        .btn-group {
            display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
            border: none; border-radius: 5px; cursor: pointer; transition: 0.2s;
            font-family: var(--font-main); text-transform: uppercase;
            display: flex; align-items: center; gap: 4px; box-shadow: var(--shadow-sm);
            color: #fff;
        }

        .btn-add { background: #2c7be5; }
        .btn-add:hover { background: #1a5fbf; }
        .btn-remove { background: #e74c3c; }
        .btn-remove:hover { background: #c0392b; }
        .btn-print { background: #27ae60; }
        .btn-print:hover { background: #1e8449; }
        .btn-reset { background: #6c757d; }
        .btn-reset:hover { background: #545b62; }
        .btn-share { background: #25D366; }
        .btn-share:hover { background: #128C7E; }

        .toast {
            position: fixed; bottom: 25px; right: 25px;
            background: #2c2c2c; color: #fff; padding: 10px 18px;
            border-radius: 6px; font-size: 13px; font-weight: 500;
            z-index: 9999; opacity: 0; transform: translateY(20px);
            transition: 0.3s; pointer-events: none; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 700px) {
            .document-container { padding: 10px 6px; }
            .main-data-table { min-width: 800px; }
            .main-data-table th, .main-data-table td { font-size: 8px; padding: 2px 2px; }
            .main-data-table textarea { font-size: 8px; min-height: 24px; }
            .btn { padding: 6px 12px; font-size: 10px; }
            .weather-entry { gap: 4px; }
            .weather-entry select { font-size: 9px; min-width: 65px; }
            .weather-entry input[type="time"] { width: 60px; font-size: 9px; }
        }
    </style>
</head>
<body>
<div class="document-container" id="documentContainer">
    <div class="main-title">LAPORAN HARIAN</div>
    <div style="text-align:center;">
        <div class="date-header-display"><span id="fullDateText">Selasa, 12 Mei 2026</span></div>
    </div>
    <div class="work-type-section">Pekerjaan CUT AND FILL</div>

    <div class="table-wrapper" id="tableWrapper">
        <table class="main-data-table" id="mainDataTable">
            <thead>
                <tr>
                    <th class="col-tenaga" rowspan="2">Tenaga Kerja</th>
                    <th class="col-alat" rowspan="2">Alat Berat</th>
                    <th class="col-jam" rowspan="2">Jam Kerja</th>
                    <th class="col-ket" rowspan="2">Keterangan</th>
                    <th colspan="3">Bahan / Material</th>
                    <th class="col-hari-ini" rowspan="2">Pekerjaan hari ini</th>
                    <th class="col-besok" rowspan="2">Pekerjaan besok</th>
                </tr>
                <tr>
                    <th class="sub-header col-mat-datang">Didatangkan</th>
                    <th class="sub-header col-mat-tolak">Ditolak</th>
                    <th class="sub-header col-mat-terima">Diterima</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="total-row-bar">
        <span class="total-label">📊 TOTAL</span>
        <span class="total-detail">: <strong id="totalTenagaDisplay">0</strong> orang</span>
    </div>

    <div class="bottom-info-section">
        <div class="weather-box">
            <div class="weather-title"><span>🌤️ Kondisi Cuaca</span></div>
            <div class="weather-entries-container" id="weatherEntriesContainer"></div>
            <button class="btn-add-weather no-print" onclick="addWeatherEntry()">➕ Tambah Rentang Cuaca</button>
        </div>
        <div class="date-box">
            <div class="info-row">
                <span class="info-label">📅 Tanggal</span>
                <input type="date" id="tanggalInput" onchange="updateDateHeader()">
            </div>
            <div class="info-row">
                <span class="info-label">🔢 Hari ke</span>
                <input type="number" id="hariKerjaInput" value="1" min="1" style="width:100%;">
            </div>
            <div class="info-row-inline">
                <span class="info-label">⏰ Mulai</span>
                <input type="time" id="jamMulaiInput" value="08:00" style="flex:1;">
                <span class="info-label">Hingga</span>
                <input type="time" id="jamHinggaInput" value="17:00" style="flex:1;">
            </div>
        </div>
    </div>

    <div class="btn-group no-print">
        <button class="btn btn-add" onclick="addRow()">➕ Tambah Baris</button>
        <button class="btn btn-remove" onclick="removeLastRow()">➖ Hapus Baris</button>
        <button class="btn btn-print" onclick="printReport()">🖨️ Cetak</button>
        <button class="btn btn-share" onclick="sharePDF()">📤 Kirim WA</button>
        <button class="btn btn-reset" onclick="resetForm()">🔄 Reset</button>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
    const tableBody = document.getElementById('tableBody');
    const totalTenagaDisplay = document.getElementById('totalTenagaDisplay');
    const tanggalInput = document.getElementById('tanggalInput');
    const fullDateText = document.getElementById('fullDateText');
    const toast = document.getElementById('toast');
    const weatherEntriesContainer = document.getElementById('weatherEntriesContainer');
    const STORAGE_KEY = 'laporan_harian_xaverius_v4';

    let rowCounter = 0;
    const MIN_ROWS = 4, MAX_ROWS = 30, MIN_WEATHER = 1, MAX_WEATHER = 12;
    let weatherEntryCounter = 0;

    const dayNames = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

    function setTodayDate() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth()+1).padStart(2,'0');
        const dd = String(today.getDate()).padStart(2,'0');
        tanggalInput.value = `${yyyy}-${mm}-${dd}`;
        updateDateHeader();
    }

    window.updateDateHeader = function() {
        const val = tanggalInput.value;
        if(!val) { fullDateText.textContent = '— Pilih Tanggal —'; return; }
        const [y,m,d] = val.split('-').map(Number);
        const date = new Date(y, m-1, d);
        fullDateText.textContent = `${dayNames[date.getDay()]}, ${d} ${monthNames[m-1]} ${y}`;
    };

    let toastTimer;
    function showToast(msg, dur=2000) {
        clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), dur);
    }

    function createWeatherEntry(type='Cerah', start='08:00', end='17:00') {
        const div = document.createElement('div');
        div.className = 'weather-entry';
        div.setAttribute('data-weather-id', weatherEntryCounter++);
        div.innerHTML = `
            <select class="weather-type-select">
                <option value="Cerah" ${type==='Cerah'?'selected':''}>☀️ Cerah</option>
                <option value="Mendung" ${type==='Mendung'?'selected':''}>☁️ Mendung</option>
                <option value="Hujan" ${type==='Hujan'?'selected':''}>🌧️ Hujan</option>
                <option value="Berawan" ${type==='Berawan'?'selected':''}>⛅ Berawan</option>
                <option value="Gerimis" ${type==='Gerimis'?'selected':''}>🌦️ Gerimis</option>
            </select>
            <span>Pukul</span>
            <input type="time" class="weather-start-time" value="${start}">
            <span class="time-sep">s/d</span>
            <input type="time" class="weather-end-time" value="${end}">
            <button class="btn-remove-weather no-print" onclick="removeWeatherEntry(this)">✕</button>`;
        return div;
    }

    window.addWeatherEntry = function() {
        if(weatherEntriesContainer.children.length >= MAX_WEATHER) { showToast('⚠️ Maksimal '+MAX_WEATHER+' cuaca'); return; }
        const entry = createWeatherEntry('Cerah','','');
        weatherEntriesContainer.appendChild(entry);
        entry.querySelector('input[type="time"]').focus();
        showToast('✅ Rentang cuaca ditambahkan');
    };

    window.removeWeatherEntry = function(btn) {
        if(weatherEntriesContainer.children.length <= MIN_WEATHER) { showToast('⚠️ Minimal 1 cuaca'); return; }
        const entry = btn.closest('.weather-entry');
        entry.style.opacity = '0'; entry.style.transform = 'translateX(30px)';
        setTimeout(() => { entry.remove(); showToast('🗑️ Dihapus'); }, 250);
    };

    function initializeWeather() {
        weatherEntriesContainer.innerHTML = '';
        weatherEntryCounter = 0;
        weatherEntriesContainer.appendChild(createWeatherEntry('Cerah','08:00','17:00'));
    }

    function autoResizeTextarea(el) {
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight) + 'px';
    }

    function createRow(index) {
        const tr = document.createElement('tr');
        tr.setAttribute('data-row-index', index);
        tr.innerHTML = `
            <td><textarea class="input-tenaga" placeholder="-" rows="1"></textarea></td>
            <td><textarea class="input-alat" placeholder="-" rows="1"></textarea></td>
            <td>
                <div class="jam-range-wrapper">
                    <input type="time" class="input-jam-start" value="">
                    <span>—</span>
                    <input type="time" class="input-jam-end" value="">
                </div>
            </td>
            <td><textarea class="input-ket" placeholder="-" rows="1"></textarea></td>
            <td><textarea class="input-mat-datang" placeholder="-" rows="2"></textarea></td>
            <td><input type="checkbox" class="input-mat-tolak" title="Material ditolak"></td>
            <td><input type="checkbox" class="input-mat-terima" title="Material diterima"></td>
            <td><textarea class="input-hari-ini" placeholder="-" rows="2"></textarea></td>
            <td><textarea class="input-besok" placeholder="-" rows="2"></textarea></td>`;
        
        tr.querySelectorAll('textarea').forEach(ta => {
            ta.addEventListener('input', function() {
                autoResizeTextarea(this);
                debounce(recalculateTotals, 300)();
            });
            setTimeout(() => autoResizeTextarea(ta), 0);
        });
        return tr;
    }

    function debounce(fn, delay) {
        let timer;
        return function(...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }

    window.addRow = function() {
        if(tableBody.querySelectorAll('tr[data-row-index]').length >= MAX_ROWS) { showToast('⚠️ Maksimal '+MAX_ROWS+' baris'); return; }
        const newRow = createRow(rowCounter++);
        tableBody.appendChild(newRow);
        recalculateTotals();
        newRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        newRow.querySelector('textarea').focus();
    };

    window.removeLastRow = function() {
        const rows = tableBody.querySelectorAll('tr[data-row-index]');
        if(rows.length <= MIN_ROWS) { showToast('⚠️ Minimal '+MIN_ROWS+' baris'); return; }
        const last = rows[rows.length-1];
        last.style.opacity = '0'; last.style.transform = 'translateX(20px)';
        setTimeout(() => { last.remove(); recalculateTotals(); showToast('🗑️ Baris dihapus'); }, 250);
    };

    function recalculateTotals() {
        let total = 0;
        tableBody.querySelectorAll('tr[data-row-index]').forEach(row => {
            const val = row.querySelector('.input-tenaga')?.value.trim();
            if(val) {
                const num = val.match(/(\d+)/);
                total += num ? parseInt(num[1]) : 1;
            }
        });
        totalTenagaDisplay.textContent = total;
    }

    window.printReport = function() {
        showToast('🖨️ Cetak landscape...');
        setTimeout(() => window.print(), 300);
    };

    // Fungsi Kirim PDF ke WhatsApp - diperbaiki agar tabel utuh
    window.sharePDF = async function() {
        showToast('⏳ Membuat PDF...');
        const container = document.getElementById('documentContainer');
        const wrapper = document.getElementById('tableWrapper');
        
        // Simpan style asli
        const origContainerWidth = container.style.width;
        const origContainerMaxWidth = container.style.maxWidth;
        const origWrapperOverflow = wrapper.style.overflow;
        const origTableMinWidth = document.getElementById('mainDataTable').style.minWidth;

        // Resize semua textarea agar konten terlihat penuh
        document.querySelectorAll('textarea').forEach(ta => autoResizeTextarea(ta));

        // Atur ulang agar tabel tidak terpotong
        container.style.width = 'auto';
        container.style.maxWidth = 'none';
        wrapper.style.overflow = 'visible';
        document.getElementById('mainDataTable').style.minWidth = '0'; // agar tabel bisa melebar natural

        const opt = {
            margin: 0,
            filename: 'laporan-harian.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true, 
                logging: false,
                windowWidth: container.scrollWidth,
                windowHeight: container.scrollHeight
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };

        try {
            const pdfBlob = await html2pdf().set(opt).from(container).outputPdf('blob');
            const file = new File([pdfBlob], 'laporan-harian.pdf', { type: 'application/pdf' });
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'Laporan Harian',
                    text: 'Laporan Harian Proyek'
                });
                showToast('✅ PDF dibagikan');
            } else {
                const url = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'laporan-harian.pdf';
                a.click();
                showToast('📥 PDF diunduh, silakan kirim manual via WhatsApp');
            }
        } catch (e) {
            console.error(e);
            showToast('❌ Gagal membuat PDF, coba lagi');
        } finally {
            // Kembalikan style asli
            container.style.width = origContainerWidth;
            container.style.maxWidth = origContainerMaxWidth;
            wrapper.style.overflow = origWrapperOverflow;
            document.getElementById('mainDataTable').style.minWidth = origTableMinWidth;
        }
    };

    window.resetForm = function() {
        if(!confirm('Reset semua data?')) return;
        document.querySelectorAll('#documentContainer textarea').forEach(el => el.value = '');
        document.querySelectorAll('#documentContainer input[type="number"]').forEach(el => el.value = '');
        document.querySelectorAll('#documentContainer input[type="checkbox"]').forEach(el => el.checked = false);
        document.querySelectorAll('#documentContainer input[type="time"]').forEach(el => {
            if(el.id === 'jamMulaiInput') el.value = '08:00';
            else if(el.id === 'jamHinggaInput') el.value = '17:00';
            else if(el.classList.contains('input-jam-start') || el.classList.contains('input-jam-end')) el.value = '';
            else if(el.classList.contains('weather-start-time') || el.classList.contains('weather-end-time')) el.value = '';
            else el.value = '';
        });
        document.getElementById('hariKerjaInput').value = '1';
        setTodayDate();
        initializeWeather();
        tableBody.innerHTML = ''; rowCounter = 0;
        for(let i=0; i<MIN_ROWS; i++) tableBody.appendChild(createRow(rowCounter++));
        recalculateTotals();
        localStorage.removeItem(STORAGE_KEY);
        showToast('✅ Form direset');
    };

    // ---- Local Storage ----
    function collectFormData() {
        const data = {
            tanggal: tanggalInput.value,
            hariKerja: document.getElementById('hariKerjaInput').value,
            jamMulai: document.getElementById('jamMulaiInput').value,
            jamHingga: document.getElementById('jamHinggaInput').value,
            rows: [],
            weather: []
        };
        tableBody.querySelectorAll('tr[data-row-index]').forEach(row => {
            data.rows.push({
                tenaga: row.querySelector('.input-tenaga')?.value || '',
                alat: row.querySelector('.input-alat')?.value || '',
                jamStart: row.querySelector('.input-jam-start')?.value || '',
                jamEnd: row.querySelector('.input-jam-end')?.value || '',
                ket: row.querySelector('.input-ket')?.value || '',
                matDatang: row.querySelector('.input-mat-datang')?.value || '',
                matTolak: row.querySelector('.input-mat-tolak')?.checked || false,
                matTerima: row.querySelector('.input-mat-terima')?.checked || false,
                hariIni: row.querySelector('.input-hari-ini')?.value || '',
                besok: row.querySelector('.input-besok')?.value || ''
            });
        });
        weatherEntriesContainer.querySelectorAll('.weather-entry').forEach(entry => {
            data.weather.push({
                type: entry.querySelector('.weather-type-select')?.value || 'Cerah',
                start: entry.querySelector('.weather-start-time')?.value || '',
                end: entry.querySelector('.weather-end-time')?.value || ''
            });
        });
        return data;
    }

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(collectFormData()));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(!saved) return false;
        try {
            const data = JSON.parse(saved);
            tanggalInput.value = data.tanggal || '';
            document.getElementById('hariKerjaInput').value = data.hariKerja || '1';
            document.getElementById('jamMulaiInput').value = data.jamMulai || '08:00';
            document.getElementById('jamHinggaInput').value = data.jamHingga || '17:00';
            updateDateHeader();
            tableBody.innerHTML = ''; weatherEntriesContainer.innerHTML = '';
            rowCounter = 0; weatherEntryCounter = 0;
            data.rows.forEach(r => {
                const tr = createRow(rowCounter++);
                tr.querySelector('.input-tenaga').value = r.tenaga || '';
                tr.querySelector('.input-alat').value = r.alat || '';
                tr.querySelector('.input-jam-start').value = r.jamStart || '';
                tr.querySelector('.input-jam-end').value = r.jamEnd || '';
                tr.querySelector('.input-ket').value = r.ket || '';
                tr.querySelector('.input-mat-datang').value = r.matDatang || '';
                tr.querySelector('.input-mat-tolak').checked = r.matTolak || false;
                tr.querySelector('.input-mat-terima').checked = r.matTerima || false;
                tr.querySelector('.input-hari-ini').value = r.hariIni || '';
                tr.querySelector('.input-besok').value = r.besok || '';
                tableBody.appendChild(tr);
                tr.querySelectorAll('textarea').forEach(ta => autoResizeTextarea(ta));
            });
            data.weather.forEach(w => {
                const entry = createWeatherEntry(w.type, w.start, w.end);
                weatherEntriesContainer.appendChild(entry);
                weatherEntryCounter++;
            });
            if(data.rows.length < MIN_ROWS) {
                for(let i=data.rows.length; i<MIN_ROWS; i++) tableBody.appendChild(createRow(rowCounter++));
            }
            if(data.weather.length < MIN_WEATHER) initializeWeather();
            recalculateTotals();
            return true;
        } catch(e) { return false; }
    }

    const autoSave = debounce(saveToLocalStorage, 400);
    document.getElementById('documentContainer').addEventListener('input', autoSave);
    document.getElementById('documentContainer').addEventListener('change', autoSave);

    function initializeApp() {
        if(!loadFromLocalStorage()) {
            tableBody.innerHTML = ''; rowCounter = 0;
            for(let i=0; i<MIN_ROWS; i++) tableBody.appendChild(createRow(rowCounter++));
            initializeWeather();
            recalculateTotals();
        }
        updateDateHeader();
        setTodayDate();
    }

    initializeApp();
    console.log('✅ Siap – mobile friendly, auto‑resize, simpan otomatis, share PDF WhatsApp');
})();
</script>
